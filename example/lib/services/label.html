        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Serif+Khmer:wght@100;200;300&display=swap');
        @page {
            margin: 0cm;
        }
        
        html {
            padding: 0;
            margin: 0;
            font-family: 'Noto Serif Khmer', 'Noto Sans', sans-serif !important;
        }

        * {
            -webkit-print-color-adjust: true;
            -webkit-print-color-adjust: exact;
        }

        body,
        p {
            width: 1.0in;
            margin: 0px;
            padding: 0px;
            font-family: 'Noto Serif Khmer', 'Noto Sans', sans-serif;
            font-size: 10px;
            line-height: 14px;
        }
      
        
        .label {
            width: 1.0in;
            height: 1.0in;
            padding: 0;
            margin: 0;
            float: left;
            text-align: center;
            outline: none !important;
            border: none !important;
            overflow: hidden;
            clear: both;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .block {
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            position: absolute;
        }

        .barcode {
            max-width: 1in;
            /* max-height:50px; */
            text-align: center;
            clear: both;
        }

        .barcode svg {
            display: block;
            width: 100%;
            height: auto;
            /* aspect ratio comes from the SVG's own viewBox, no need to force one */
        }
        
        .page-break {
            clear: left;
            display: block;
            page-break-after: auto;
        }
        
        @media print {
            @page {
                size: 1.0in 1.0in;
                size: portrate;
                margin: 0px;
                outline: none !important;
                border: none !important;
            }
            .label {
                size: 1.0in 1.0in;
                outline: none !important;
                border: none !important;
                margin: 0px;
                padding: 0px;

            }
            .label, .page-break, div[class*="label"] {
                outline: none !important;
                border: none !important;
            }
        }
        /* barcode css */
    </style>

</head>
